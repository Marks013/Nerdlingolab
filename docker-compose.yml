name: nerdlingolab-commerce

x-service-logging: &service-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-app-environment: &app-environment
  APP_URL: ${APP_URL:-http://localhost:3001}
  AUTH_URL: ${AUTH_URL:-${APP_URL:-http://localhost:3001}}
  AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
  AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
  AUTH_SECRET: ${AUTH_SECRET:-temporary-auth-secret-change-me-64-characters-minimum-000000000000}
  AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
  CHECKOUT_PAYMENT_MOCK: ${CHECKOUT_PAYMENT_MOCK:-false}
  CHECKOUT_PENDING_PAYMENT_TTL_HOURS: ${CHECKOUT_PENDING_PAYMENT_TTL_HOURS:-24}
  DATABASE_URL: postgresql://${POSTGRES_USER:-nerdlingolab}:${POSTGRES_PASSWORD:-temporary-postgres-password-change-me}@postgres:5432/${POSTGRES_DB:-nerdlingolab}?schema=public
  EMAIL_FROM: ${EMAIL_FROM:-NerdLingoLab <no-reply@nerdlingolab.local>}
  MERCADO_ENVIOS_ACCESS_TOKEN: ${MERCADO_ENVIOS_ACCESS_TOKEN:-}
  MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
  MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY:-}
  MERCADO_PAGO_RETURN_URL_BASE: ${MERCADO_PAGO_RETURN_URL_BASE:-}
  MERCADO_PAGO_WEBHOOK_URL: ${MERCADO_PAGO_WEBHOOK_URL:-}
  MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
  MELHOR_ENVIO_ACCESS_TOKEN: ${MELHOR_ENVIO_ACCESS_TOKEN:-}
  MELHOR_ENVIO_BASE_URL: ${MELHOR_ENVIO_BASE_URL:-https://melhorenvio.com.br}
  MELHOR_ENVIO_FROM_POSTAL_CODE: ${MELHOR_ENVIO_FROM_POSTAL_CODE:-}
  MELHOR_ENVIO_SERVICE_IDS: ${MELHOR_ENVIO_SERVICE_IDS:-}
  MELHOR_ENVIO_USER_AGENT: ${MELHOR_ENVIO_USER_AGENT:-NerdLingoLab (nerdlingolab@gmail.com)}
  MINIO_BUCKET: ${MINIO_BUCKET:-product-images}
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  NEXTAUTH_URL: ${NEXTAUTH_URL:-${AUTH_URL:-${APP_URL:-http://localhost:3001}}}
  NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY: ${NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY:-${MERCADO_PAGO_PUBLIC_KEY:-}}
  NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
  NEXT_PUBLIC_SENTRY_ENABLE_LOGS: ${NEXT_PUBLIC_SENTRY_ENABLE_LOGS:-false}
  NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
  NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-}
  NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: "${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?NEXT_SERVER_ACTIONS_ENCRYPTION_KEY is required. Generate with openssl rand -base64 32}"
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  SUPPORT_EMAIL: ${SUPPORT_EMAIL:-nerdlingolab@gmail.com}
  MAINTENANCE_BYPASS_TOKEN: ${MAINTENANCE_BYPASS_TOKEN:-}
  MAINTENANCE_MESSAGE: ${MAINTENANCE_MESSAGE:-}
  MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
  MAINTENANCE_RETRY_AFTER_SECONDS: ${MAINTENANCE_RETRY_AFTER_SECONDS:-900}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-nerdlingolab}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-temporary-minio-password-change-me}
  SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
  SENTRY_AUTH_URL: ${SENTRY_AUTH_URL:-https://sentry.io/oauth/authorize/}
  SENTRY_CLIENT_ID: ${SENTRY_CLIENT_ID:-}
  SENTRY_CLIENT_SECRET: ${SENTRY_CLIENT_SECRET:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENABLE_LOGS: ${SENTRY_ENABLE_LOGS:-false}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
  SENTRY_ORG: ${SENTRY_ORG:-}
  SENTRY_PERSONAL_AUTH_TOKEN: ${SENTRY_PERSONAL_AUTH_TOKEN:-}
  SENTRY_PROJECT: ${SENTRY_PROJECT:-}
  SENTRY_REGION_URL: ${SENTRY_REGION_URL:-https://us.sentry.io}
  SENTRY_RELEASE: ${SENTRY_RELEASE:-}
  SENTRY_SECURITY_TOKEN: ${SENTRY_SECURITY_TOKEN:-}
  SENTRY_TOKEN_URL: ${SENTRY_TOKEN_URL:-https://sentry.io/oauth/token/}
  SHOPIFY_IMPORT_DEFAULT_STOCK: ${SHOPIFY_IMPORT_DEFAULT_STOCK:-10}
  SHOPIFY_PRODUCTS_CSV: ${SHOPIFY_PRODUCTS_CSV:-data/shopify/products_export_1.csv}
  SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@nerdlingolab.local}
  SUPERADMIN_NAME: ${SUPERADMIN_NAME:-NerdLingoLab Admin}
  SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Temporary-admin-password-123!}

services:
  postgres:
    image: postgres:16-alpine
    container_name: nerdlingolab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nerdlingolab}
      POSTGRES_USER: ${POSTGRES_USER:-nerdlingolab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_DIR:-/srv/nerdlingolab/postgres-data}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *service-logging
    networks:
      - commerce

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: nerdlingolab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "${MINIO_API_HOST_PORT:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-127.0.0.1:9001}:9001"
    volumes:
      - type: bind
        source: ${MINIO_DATA_DIR:-/srv/nerdlingolab/minio-data}
        target: /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *service-logging
    networks:
      - commerce

  minio-create-bucket:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: nerdlingolab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_BUCKET: ${MINIO_BUCKET:-product-images}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-temporary-minio-password-change-me}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nerdlingolab}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        mc anonymous set download "local/$$MINIO_BUCKET"
    logging: *service-logging
    networks:
      - commerce

  setup:
    build:
      context: .
      target: setup
    command: npm run db:bootstrap
    container_name: nerdlingolab-setup
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *app-environment
    profiles:
      - setup
    logging: *service-logging
    networks:
      - commerce

  app:
    build:
      context: .
      target: runner
      args:
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: "${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?NEXT_SERVER_ACTIONS_ENCRYPTION_KEY is required. Generate with openssl rand -base64 32}"
    container_name: nerdlingolab-app
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *app-environment
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:3000/api/health/ready').then(async (response) => { if (!response.ok) process.exit(1); const body = await response.json(); if (!body.ok) process.exit(1); }).catch(() => process.exit(1))"
      interval: 15s
      retries: 10
      start_period: 45s
      timeout: 5s
    ports:
      - "${APP_HOST_PORT:-3001}:3000"
    restart: unless-stopped
    logging: *service-logging
    networks:
      - commerce

  billing-cron:
    image: curlimages/curl:8.11.1
    container_name: nerdlingolab-billing-cron
    depends_on:
      app:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        while true; do
          TOKEN="$${CRON_SECRET:-$${AUTH_SECRET:-$${NEXTAUTH_SECRET:-}}}"
          if [ -z "$$TOKEN" ]; then
            echo "$$(date -Is) CRON_SECRET/AUTH_SECRET ausente"
          else
            curl -fsS -X POST -H "Authorization: Bearer $$TOKEN" "http://app:3000/api/cron/billing?limit=$${BILLING_CRON_LIMIT:-50}" || true
            echo
          fi
          sleep "$${BILLING_CRON_INTERVAL_SECONDS:-300}"
        done
    environment: *app-environment
    restart: unless-stopped
    logging: *service-logging
    networks:
      - commerce

  newsletter-cron:
    image: curlimages/curl:8.11.1
    container_name: nerdlingolab-newsletter-cron
    depends_on:
      app:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        while true; do
          TOKEN="$${CRON_SECRET:-$${AUTH_SECRET:-$${NEXTAUTH_SECRET:-}}}"
          if [ -z "$$TOKEN" ]; then
            echo "$$(date -Is) CRON_SECRET/AUTH_SECRET ausente"
          else
            curl -fsS -X POST -H "Authorization: Bearer $$TOKEN" "http://app:3000/api/cron/newsletter?limit=$${NEWSLETTER_CRON_LIMIT:-50}" || true
            echo
          fi
          sleep "$${NEWSLETTER_CRON_INTERVAL_SECONDS:-300}"
        done
    environment: *app-environment
    restart: unless-stopped
    logging: *service-logging
    networks:
      - commerce


networks:
  commerce:
    driver: bridge
